name: Tier1 Breaking News

on:
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore sent URL history
        uses: actions/cache@v4
        with:
          path: data/sent_urls.json
          key: sent-urls-${{ github.repository }}

      - name: Send tier1-only briefing
        env:
          TIER1_ONLY: "1"
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CHANNEL_ID: ${{ secrets.CHANNEL_ID }}
        run: python main.py

      - name: Notify failure
        if: failure() && secrets.FAILURE_WEBHOOK_URL != ''
        env:
          FAILURE_WEBHOOK_URL: ${{ secrets.FAILURE_WEBHOOK_URL }}
        run: |
          curl -sf -H "Content-Type: application/json" \
            -d "{\"content\":\"❌ 1티어 속보 워크플로 실패: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$FAILURE_WEBHOOK_URL"
